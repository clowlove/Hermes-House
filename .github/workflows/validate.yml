name: Validate Skills

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Validate skill.json files
        run: |
          echo "🔍 检查 skill.json 格式..."
          for dir in skills/*/; do
            skill=$(basename "$dir")
            if [ -f "$dir/skill.json" ]; then
              python3 -c "import json; json.load(open('$dir/skill.json'))" 2>/dev/null
              if [ $? -eq 0 ]; then
                echo "✅ $skill: skill.json 格式正确"
              else
                echo "❌ $skill: skill.json 格式错误"
                exit 1
              fi
            fi
          done
      
      - name: Check required files
        run: |
          echo "🔍 检查必需文件..."
          for dir in skills/*/; do
            skill=$(basename "$dir")
            if [ ! -f "$dir/SKILL.md" ]; then
              echo "❌ $skill: 缺少 SKILL.md"
              exit 1
            fi
            if [ ! -f "$dir/skill.json" ]; then
              echo "❌ $skill: 缺少 skill.json"
              exit 1
            fi
            echo "✅ $skill: 文件完整"
          done
      
      - name: Validate skill.json structure
        run: |
          python3 scripts/validate_skills.py

  lint-readme:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Check README exists
        run: |
          if [ ! -f README.md ]; then
            echo "❌ 缺少 README.md"
            exit 1
          fi
          
          if ! grep -q "##" README.md; then
            echo "❌ README.md 缺少必要的章节"
            exit 1
          fi
          
          echo "✅ README.md 格式正确"