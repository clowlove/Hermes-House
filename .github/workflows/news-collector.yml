name: AI News Collector
on:
  schedule:
    - cron: '0 6,18 * * *'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Fetch arXiv cs.AI papers
        run: |
          curl -s "https://export.arxiv.org/api/query?search_query=cat:cs.AI&start=0&max_results=8&sortBy=submittedDate&sortOrder=descending" | \
          python3 -c "
import sys, re
content = sys.stdin.read()
entries = re.split(r'<entry>', content)[1:]
print('### 📄 Latest arXiv cs.AI Papers\n')
for e in entries[:8]:
    title = re.search(r'<title>(.*?)</title>', e, re.DOTALL)
    link = re.search(r'<id>(.*?)</id>', e)
    if title:
        t = title.group(1).replace('\n', ' ').strip()
        l = link.group(1).strip() if link else ''
        print(f'- [{t}]({l})')
" >> $GITHUB_STEP_SUMMARY
          
      - name: Create news issue
        if: github.event_name == 'schedule'
        run: |
          date=$(date +%Y-%m-%d)
          body="## AI News Digest - $(date +'%Y年%m月%d日')\n\nCollected at $(date -u +'%H:%M UTC')\n\n<!-- news -->"
          
          # Check for existing open news issue
          existing=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/clowlove/Harmes-House/issues?state=open&labels=news" | \
            python3 -c "import sys,json; i=json.load(sys.stdin); print(str(i[0]['number']) if i else '')" 2>/dev/null)
          
          if [ -n "$existing" ]; then
            echo "News issue #$existing exists, skipping new issue creation"
          else
            echo "Would create new issue (schedule run)"