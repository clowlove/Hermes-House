name: Daily Evolution

on:
  schedule:
    - cron: '0 1 * * *'  # 每天 09:00 北京时间
  workflow_dispatch:       # 手动触发

jobs:
  discover:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v7
      with:
        ref: evolution
        token: ${{ secrets.CLAWLOVE_TOKEN }}

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Run Discovery
      run: |
        python3 ~/.hermes/scripts/hermes_evolution_sync.py

    - name: Prepare Commit
      run: |
        DATE=$(date +%Y-%m-%d)
        cp /tmp/hermes-evolution-${DATE}.md docs/evolution/log-${DATE}.md || true
        
        if git diff --quiet; then
          echo "No changes to commit"
        else
          git config user.name "Hermes Auto"
          git config user.email "auto@hermes.ai"
          git add -A
          git commit -m "automation: ${DATE} daily evolution"
          git push origin evolution
        fi

    - name: Create PR
      if: success()
      run: |
        DATE=$(date +%Y-%m-%d)
        gh pr create \
          --title "evolution: ${DATE} daily update" \
          --body "🤖 自动演化更新 | Generated by hermes-house automation" \
          --base main \
          --head evolution
      env:
        GH_TOKEN: ${{ secrets.CLAWLOVE_TOKEN }}

    - name: Notify Telegram
      if: success()
      run: |
        echo "Daily evolution completed successfully"
