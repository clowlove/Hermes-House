name: 'Stale Issues & PRs'

on:
  schedule:
  - cron: '0 0 * * *'  # Run daily at midnight

jobs:
  stale:
    name: 'Mark Stale'
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/stale@v9
      with:
        # Days before marking as stale
        days-before-stale: 30
        
        # Days before closing stale issues
        days-before-close: 7
        
        # Issues to check
        operations-per-run: 100
        
        # Stale issue message
        stale-issue-message: |
          👋 Hi there! This issue has been open for 30 days.
          
          If no one responds within 7 days, we will auto-close this issue.
          
          💡 Tips:
          - Check if the issue still exists
          - Provide more details if possible
          - Tag relevant people
        
        # Stale PR message
        stale-pr-message: |
          👋 This PR has been marked as stale.
          
          If no activity in 7 days, we will close it.
        
        # Close message
        close-message: |
          This issue/PR has been closed due to inactivity.
          
          Feel free to reopen if you still need help!

        # Labels
        stale-issue-label: 'stale'
        close-issue-label: 'closed-by-stale'
        
        # Exempt from being marked stale
        exempt-issue-labels: 'pinned,security,priority:high'
        exempt-pr-labels: 'pinned,security'
        
        # Only issues/PRs, no pulls from drafts
        only-labels: ''
        remove-stale-when-updated: true