name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  quality:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '22'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run tests
      run: npm test
      
    - name: Check formatting
      run: npm run lint

  sync-docs:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Sync to GitHub Pages
      run: |
        # Deploy docs to GitHub Pages
        echo "Deploying documentation..."
        
    - name: Update insights
      run: |
        # Update daily insights
        echo "Updating insights..."

  notify:
    needs: [quality, sync-docs]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: Notify Status
      run: |
        echo "CI Status: ${{ needs.quality.result }}"