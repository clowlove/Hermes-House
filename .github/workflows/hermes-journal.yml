name: "Hermès Growth Journal"
description: "Auto-update the Hermès journal with latest activities"

on:
  schedule:
    - cron: "0 20 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  update-journal:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Update Journal with Community Findings
        run: |
          python3 << 'PYEOF'
          import subprocess
          from pathlib import Path
          from datetime import datetime
          import re
          import urllib.request
          import json
          
          journal_file = Path("hermes-journal.md")
          log_file = Path("docs/evolution/log-2026-05.md")
          
          # Search for trending AI Agent projects
          queries = [
              "AI agent autonomous reasoning MCP",
              "LLM tool use agent framework 2025",
          ]
          
          all_projects = []
          for q in queries[:1]:  # Just do 1 query to save time
              try:
                  url = f"https://api.github.com/search/repositories?q={urllib.parse.quote(q)}&sort=stars&order=desc&per_page=5"
                  req = urllib.request.Request(url, headers={"Authorization": f"token {subprocess.run(['git', 'config', 'user.token'], capture_output=True, text=True).stdout.strip()}"} if subprocess.run(['git', 'config', 'user.token'], capture_output=True, text=True).stdout.strip() else {})
                  with urllib.request.urlopen(req, timeout=10) as resp:
                      items = json.loads(resp.read().decode())["items"][:3]
                      for item in items:
                          if item.get("stargazers_count", 0) > 100:
                              all_projects.append({
                                  "name": item["name"],
                                  "full_name": item["full_name"],
                                  "stars": item["stargazers_count"],
                                  "description": item.get("description", "无描述") or "无描述"
                              })
              except Exception as e:
                  print(f"Search error: {e}")
          
          # Deduplicate
          seen = set()
          unique = []
          for p in all_projects:
              if p["full_name"] not in seen:
                  seen.add(p["full_name"])
                  unique.append(p)
          
          if not unique:
              print("No new projects found")
          else:
              print(f"Found {len(unique)} new projects")
              
              # Update evolution log
              if log_file.exists():
                  today = datetime.now().strftime("%Y-%m-%d")
                  entry = f"\n### {today} — 社区探索\n\n**发现的新项目：**\n\n"
                  for p in unique:
                      entry += f"- **{p['name']}** ({p['stars']}⭐): {p['description']}\n"
                      entry += f"  - URL: https://github.com/{p['full_name']}\n"
                  entry += "\n---\n"
                  
                  content = log_file.read_text()
                  content = content.replace("\n---\n\n*日志自动生成，最后更新:", f"\n{entry}\n---\n\n*日志自动生成，最后更新:")
                  log_file.write_text(content)
                  print(f"Updated evolution log")
          
          # Update journal timestamp
          if journal_file.exists():
              content = journal_file.read_text()
              content = re.sub(
                  r'\*最后更新：\d{4}-\d{2}-\d{2} \d{2}:\d{2} UTC\*',
                  f'*最后更新：{datetime.now().strftime("%Y-%m-%d %H:%M")} UTC*',
                  content
              )
              journal_file.write_text(content)
              print("Journal timestamp updated")
          PYEOF
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Create Branch and Commit
        id: create-branch
        run: |
          BRANCH="auto/journal-update-$(date +%Y%m%d-%H%M%S)"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV
          git checkout -b "$BRANCH"
          git config user.name "Hermès Agent"
          git config user.email "hermes@clowlove.dev"
          git add -A
          git diff --staged --quiet || git commit -m "Auto-update journal"
          git push -u origin "$BRANCH"

      - name: Create Pull Request
        uses: actions/github-script@v7
        with:
          script: |
            const branch = process.env.BRANCH;
            const { repo, owner } = context.repo;
            const pr = await github.rest.pulls.create({
              title: `Auto-update journal (${new Date().toISOString().slice(0,10)})`,
              head: branch,
              base: 'main',
              body: '🤖 Automated journal update',
              maintainer_can_modify: true
            });
            await github.rest.pulls.merge({ owner, repo, pull_number: pr.data.number });
        env:
          BRANCH: ${{ env.BRANCH }}

  weekly-reflection:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Weekly Summary
        run: |
          python3 << 'PYEOF'
          import subprocess
          from pathlib import Path

          result = subprocess.run(
              ["git", "log", "--oneline", "--since=7 days ago", "--format=%s"],
              capture_output=True,
              text=True
          )
          commits = [c for c in result.stdout.strip().split('\n') if c]

          if commits:
              lines = []
              lines.append("### 本周总结")
              lines.append("")
              lines.append(f"本周共 {len(commits)} 次提交：")
              lines.append("")
              for commit in commits[:10]:
                  lines.append(f"- {commit}")
              if len(commits) > 10:
                  lines.append(f"- ... 还有 {len(commits) - 10} 次提交")

              print('\n'.join(lines))
          PYEOF

      - name: Create Branch and Commit
        id: weekly-branch
        run: |
          BRANCH="auto/weekly-summary-$(date +%Y%m%d-%H%M%S)"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV
          git checkout -b "$BRANCH"
          git config user.name "Hermès Agent"
          git config user.email "hermes@clowlove.dev"
          git add hermes-journal.md
          git diff --staged --quiet || git commit -m "Weekly summary update"
          git push -u origin "$BRANCH"

      - name: Create Pull Request
        uses: actions/github-script@v7
        with:
          script: |
            const branch = process.env.BRANCH;
            const { repo, owner } = context.repo;
            const pr = await github.rest.pulls.create({
              title: `Weekly summary (${new Date().toISOString().slice(0,10)})`,
              head: branch,
              base: 'main',
              body: '🤖 Automated weekly summary',
              maintainer_can_modify: true
            });
            await github.rest.pulls.merge({ owner, repo, pull_number: pr.data.number });
        env:
          BRANCH: ${{ env.BRANCH }}