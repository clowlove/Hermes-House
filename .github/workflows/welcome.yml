name: Welcome New Issues
on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]
permissions:
  issues: write
  pull-requests: write
jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - name: Welcome Issue
        if: github.event_name == 'issues'
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const isFirstIssue = issue.body && (issue.body.toLowerCase().includes('first issue') || issue.body.toLowerCase().includes('good first'));
            const comment = isFirstIssue ? `Welcome! 🎉 Thank you for opening this issue. We're glad to have you here.` : `Thank you for opening this issue. Someone will review it shortly.`;
            await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: issue.number, body: comment });
            if (isFirstIssue) { await github.rest.issues.addLabels({ owner: context.repo.owner, repo: context.repo.repo, issue_number: issue.number, labels: ['good first issue'] }); }
      - name: Welcome PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: pr.number, body: `Thank you for your contribution! 🎉 PRs are typically reviewed within 2-3 business days.` });
