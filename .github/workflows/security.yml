     1|name: Security & Quality
     2|
     3|on:
     4|  push:
     5|    branches: [main]
     6|  pull_request:
     7|    branches: [main]
     8|
     9|permissions:
    10|  contents: read
    11|  security-events: write
    12|
    13|jobs:
    14|  dependency-review:
    15|    name: Dependency Review
