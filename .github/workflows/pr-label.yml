name: PR Auto-Label
on:
  pull_request:
    types: [opened, synchronize]
permissions:
  contents: read
  pull-requests: write
jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - name: Auto-assign based on changes
        uses: actions/github-script@v9
        with:
          script: |
            const pr = context.payload.pull_request;
            const { data: files } = await github.rest.pulls.listFiles({ owner: context.repo.owner, repo: context.repo.repo, pull_number: pr.number });
            const labels = new Set();
            for (const file of files) {
              const p = file.filename;
              if (p.startsWith('docs/') || p.endsWith('.md')) labels.add('docs');
              if (p.includes('.github/workflows/')) labels.add('ci/cd');
              if (p.startsWith('skills/')) labels.add('skills');
              if (p.endsWith('.py') || p.endsWith('.sh')) labels.add('scripts');
              if (p.startsWith('.github/')) labels.add('config');
            }
            if (labels.size > 0) await github.rest.issues.addLabels({ owner: context.repo.owner, repo: context.repo.repo, issue_number: pr.number, labels: [...labels] });
