# Auto-merge PRs that pass CI
name: Auto Merge
on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pascalgn/automerge-action@v0.16
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MERGE_METHOD: squash
          AUTO_MERGE_METHOD: squash
          UPDATE_METHOD: merge
          MAX_RETRY: 5