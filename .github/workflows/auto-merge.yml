name: 'Auto Merge'

on:
  pull_request:
    types: [labeled]

jobs:
  auto-merge:
    name: 'Auto Merge PR'
    runs-on: ubuntu-latest
    
    # Only run on PRs from branches (not forks for security)
    if: github.event.pull_request.head.repo.full_name == github.repository
    
    steps:
    - name: Check required labels
      if: |
        contains(github.event.pull_request.labels.*.name, 'dependencies') ||
        contains(github.event.pull_request.labels.*.name, 'npm') ||
        contains(github.event.pull_request.labels.*.name, 'github-actions') ||
        contains(github.event.pull_request.labels.*.name, 'python')
      run: echo "PR has auto-merge label"
      
    - name: Auto Merge
      if: |
        contains(github.event.pull_request.labels.*.name, 'dependencies') ||
        contains(github.event.pull_request.labels.*.name, 'npm') ||
        contains(github.event.pull_request.labels.*.name, 'github-actions') ||
        contains(github.event.pull_request.labels.*.name, 'python')
      uses: actions/github-script@v7
      with:
        script: |
          // Check if PR is approved
          const { data: reviews } = await github.rest.pulls.listReviews({
            owner: context.repo.owner,
            repo: context.repo.repo,
            pull_number: context.payload.pull_request.number
          });
          
          const approved = reviews.some(r => r.state === 'APPROVED');
          
          if (approved || context.payload.pull_request.draft === false) {
            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              merge_method: 'squash',
              commit_title: context.payload.pull_request.title
            });
            console.log('PR merged successfully');
          } else {
            console.log('PR not yet approved, waiting for reviews');
          }

  notify-failure:
    name: 'Notify Merge Failure'
    runs-on: ubuntu-latest
    needs: auto-merge
    if: failure()
    
    steps:
    - name: Notify failure
      run: |
        echo "Auto-merge failed for PR #${{ github.event.pull_request.number }}"
        echo "Title: ${{ github.event.pull_request.title }}"
      # Could add Telegram notification here