name: Validate Skills

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Check required files
        run: |
          for dir in skills/*/; do
            skill=$(basename "$dir")
            [ -f "$dir/SKILL.md" ] && echo "✅ $skill has SKILL.md" || { echo "❌ $skill missing SKILL.md"; exit 1; }
            [ -f "$dir/skill.json" ] && echo "✅ $skill has skill.json" || { echo "❌ $skill missing skill.json"; exit 1; }
          done
          echo "🎉 All skills validated!"
