site_name: hermes-house
site_description: Hermes Agent 技能仓库 — 自动化你的 AI 工作流
site_url: https://clowlove.github.io/hermes-house/
repo_name: clowlove/hermes-house
repo_url: https://github.com/clowlove/hermes-house

theme:
  name: material
  palette: 
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: deep purple
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: deep purple
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Skills: skills.md
  - Contributing: contributing.md
  - Evolution:
    - 成长日志: evolution/log-2026-05.md
    - 架构模式: evolution/architecture-patterns.md
    - 技术发现: evolution/tech-discoveries.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.details